name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Generate icons
        run: python generate_icons.py

      - name: Build exe
        run: python -m PyInstaller DeltaResolutionSwitcher.spec --noconfirm

      - name: Copy config
        run: Copy-Item config.json dist\config.json

      - name: Copy assets
        run: Copy-Item -Recurse assets dist\assets

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path dist/DeltaResolutionSwitcher.exe, dist/config.json, dist/assets `
            -DestinationPath "DeltaResolutionSwitcher-$version.zip" -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: DeltaResolutionSwitcher-*.zip
          generate_release_notes: true
